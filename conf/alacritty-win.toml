[colors.primary]
background = '#000000'

[env]
TERM = 'xterm-256color'

[font]
size = 18

[font.glyph_offset]
x = -1
y = -2

[font.normal]
family = 'JetBrainsMono NF'

[font.offset]
x = -2
y = -7

[[mouse.bindings]]
action = 'Paste'
mouse = 'Right'

[selection]
save_to_clipboard = true

[window]
decorations = 'none'
opacity = 0.8
startup_mode = 'Maximized'

[terminal]
shell = { program = 'C:/msys64/msys2_shell.cmd', args = [
  '-use-full-path',
  '-defterm',
  '-no-start',
  '-ucrt64',
  '-where',
  '%userprofile%',
  '-shell',
  'fish',
] }
